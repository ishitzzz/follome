<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FolloMe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="logo-group">
        <div class="logo-icon">✦</div>
        <div class="logo-text">
          <span class="logo-name">FolloMe</span>
          <span class="logo-tag">AI Browser Assistant</span>
        </div>
      </div>
      <div class="status-dot" id="statusDot"></div>
    </div>

    <!-- Page Info -->
    <div class="page-info" id="pageInfo">
      <div class="page-info-label">Current Page</div>
      <div class="page-info-title" id="pageTitle">Loading...</div>
      <div class="page-info-url" id="pageUrl"></div>
    </div>

    <!-- Main Action -->
    <button class="btn-main" id="btnAnalyze">
      <div class="btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 16v-4"></path>
          <path d="M12 8h.01"></path>
        </svg>
      </div>
      <div class="btn-text">
        <span class="btn-label">Ask AI about this page</span>
        <span class="btn-sub">Extract context & get guidance</span>
      </div>
      <div class="btn-arrow">→</div>
    </button>

    <!-- Custom Question -->
    <div class="question-box">
      <input type="text" id="questionInput" placeholder="Or ask something specific..." />
      <button class="btn-ask" id="btnAsk" title="Ask">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    
    <div class="voice-tip" style="font-size: 11px; color: rgba(255, 255, 255, 0.5); text-align: center; margin-top: 8px;">
      💡 Tip: Press <strong>Ctrl+Shift+K</strong> on any page to use Learning Mode with Voice
    </div>

    <!-- AI Platform Selector -->
    <div class="ai-selector">
      <div class="ai-label">AI Platform</div>
      <div class="ai-options">
        <button class="ai-option active" data-ai="chatgpt">
          <span class="ai-dot chatgpt"></span>
          ChatGPT
        </button>
        <button class="ai-option" data-ai="gemini">
          <span class="ai-dot gemini"></span>
          Gemini
        </button>
        <button class="ai-option" data-ai="claude">
          <span class="ai-dot claude"></span>
          Claude
        </button>
      </div>
    </div>

    <!-- Settings: Groq API Key -->
    <div class="settings-section">
      <div class="settings-header" id="settingsToggle">
        <div class="settings-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          Settings
        </div>
        <span class="settings-chevron" id="settingsChevron">›</span>
      </div>
      <div class="settings-body" id="settingsBody">
        <div class="key-field">
          <label class="key-label" for="groq-api-key">Groq API Key</label>
          <div class="key-input-row">
            <input type="password" id="groq-api-key" class="key-input" placeholder="gsk_..." autocomplete="off" spellcheck="false" />
            <button class="btn-save-key" id="save-key-btn" title="Save API Key">Save</button>
          </div>
          <div class="key-status" id="keyStatus"></div>
        </div>
      </div>
    </div>

    <!-- Status Message -->
    <div class="status-bar" id="statusBar">
      <div class="status-indicator"></div>
      <span id="statusText">Ready</span>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <span>v1.0.0</span>
      <span>·</span>
      <span id="eventCount">0 events tracked</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
